<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haptic Volume Knob</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="knob-wrapper">
            <h1 class="title">Volume Control</h1>
            
            <!-- Volume Display -->
            <div class="volume-display">
                <span class="volume-value">50</span>
                <span class="volume-percent">%</span>
            </div>

            <!-- Knob Container -->
            <div class="knob-container">
                <!-- Scale markers -->
                <svg class="scale-markers" viewBox="0 0 300 300">
                    <circle cx="150" cy="150" r="130" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                    <circle cx="150" cy="150" r="125" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
                </svg>
                
                <!-- Progress Arc -->
                <svg class="progress-arc" viewBox="0 0 300 300">
                    <defs>
                        <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <path class="progress-path" d="" stroke="url(#progressGradient)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)"/>
                </svg>

                <!-- Knob -->
                <div class="knob" id="knob">
                    <div class="knob-inner">
                        <div class="knob-groove"></div>
                        <div class="knob-indicator"></div>
                        <div class="knob-center">
                            <div class="knob-center-dot"></div>
                        </div>
                    </div>
                </div>

                <!-- Tick marks -->
                <div class="tick-marks">
                    <div class="tick tick-0"><span>0</span></div>
                    <div class="tick tick-25"><span>25</span></div>
                    <div class="tick tick-50"><span>50</span></div>
                    <div class="tick tick-75"><span>75</span></div>
                    <div class="tick tick-100"><span>100</span></div>
                </div>
            </div>

            <!-- Control Buttons -->
            <div class="controls">
                <button class="control-btn mute-btn" id="muteBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                    </svg>
                </button>
                <button class="control-btn haptic-btn" id="hapticBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M7 7h10v1.79c0 .45.54.67.85.35l2.79-2.79c.2-.2.2-.51 0-.71l-2.79-2.79c-.31-.31-.85-.09-.85.36V5H6c-.55 0-1 .45-1 1v4c0 .55.45 1 1 1s1-.45 1-1V7zm10 10H7v-1.79c0-.45-.54-.67-.85-.35l-2.79 2.79c-.2.2-.2.51 0 .71l2.79 2.79c.31.31.85.09.85-.36V19h11c.55 0 1-.45 1-1v-4c0-.55-.45-1-1-1s-1 .45-1 1v3z"/>
                    </svg>
                    <span class="haptic-status">ON</span>
                </button>
            </div>

            <!-- Info -->
            <div class="info">
                <p class="instruction">Click and drag the knob or use arrow keys</p>
                <p class="haptic-indicator" id="hapticIndicator">Haptic Feedback: <span class="status-active">ACTIVE</span></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
